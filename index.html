<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plant</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f1410;color:#e8efe9;
       min-height:100vh;padding:32px 20px;max-width:480px;margin:0 auto}
  h1{font-weight:300;font-size:32px;margin:0 0 8px;letter-spacing:-0.5px}
  h1 span{color:#7cc26b;font-style:italic}
  .sub{font-size:13px;color:#a8b3a9;margin-bottom:32px;font-family:monospace;
       letter-spacing:0.1em;text-transform:uppercase}
  .conn{display:inline-block;width:8px;height:8px;border-radius:50%;
        background:#e26a5b;margin-right:8px}
  .conn.ok{background:#7cc26b;box-shadow:0 0 8px #7cc26b}
  .card{background:#161d18;border:1px solid #2a342d;border-radius:14px;
        padding:24px;margin-bottom:14px}
  .label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
         color:#7cc26b;margin-bottom:10px}
  .value{font-size:42px;font-weight:200;line-height:1}
  .unit{font-size:16px;color:#a8b3a9;margin-left:6px;font-weight:400}
  .bar{height:6px;background:#2a342d;border-radius:3px;
       margin-top:14px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,#5cc4e0,#7cc26b);
            transition:width 0.6s ease}
  button{width:100%;padding:24px;background:#7cc26b;color:#0f1410;
         border:none;border-radius:14px;font-size:18px;font-weight:600;
         letter-spacing:0.1em;text-transform:uppercase;margin-top:24px;
         cursor:pointer;transition:all 0.2s}
  button:active{transform:scale(0.98)}
  button:disabled{background:#3a4a3a;color:#7a857c;cursor:not-allowed}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid .card{margin:0}
  .charts{margin-top:32px}
  .charts iframe{width:100%;height:260px;border:1px solid #2a342d;
                 border-radius:14px;background:#161d18;margin-bottom:14px}
</style>
</head>
<body>

<h1>My <span>Plant</span></h1>
<div class="sub"><span class="conn" id="conn"></span>
  <span id="connText">connecting...</span></div>

<div class="card">
  <div class="label">Soil moisture</div>
  <div class="value"><span id="soil">–</span><span class="unit">%</span></div>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
</div>

<div class="grid">
  <div class="card">
    <div class="label">Temp</div>
    <div class="value"><span id="temp">–</span><span class="unit">°C</span></div>
  </div>
  <div class="card">
    <div class="label">Humidity</div>
    <div class="value"><span id="hum">–</span><span class="unit">%</span></div>
  </div>
</div>

<div class="card" style="margin-top:14px">
  <div class="label">Air CO₂</div>
  <div class="value"><span id="co2">–</span><span class="unit">ppm</span></div>
</div>

<button id="btn" onclick="water()">💧 Water now</button>

<div class="charts">
  <div class="label" style="margin:32px 0 14px">History (last 24h)</div>
  <!-- EDIT THIS: replace 1234567 with your ThingSpeak channel ID -->
  <iframe src="https://thingspeak.mathworks.com/channels/3365207/charts/1?bgcolor=%23161d18&color=%237cc26b&dynamic=true&results=288&type=line&title=Soil%20%25"></iframe>
  <iframe src="https://thingspeak.mathworks.com/channels/3365207/charts/2?bgcolor=%23161d18&color=%23e8a13d&dynamic=true&results=288&type=line&title=Temperature"></iframe>
  <iframe src="https://thingspeak.mathworks.com/channels/3365207/charts/3?bgcolor=%23161d18&color=%235cc4e0&dynamic=true&results=288&type=line&title=Humidity"></iframe>
  <iframe src="https://thingspeak.mathworks.com/channels/3365207/charts/3?bgcolor=%23161d18&color=%235c8a8e8&dynamic=true&results=288&type=line&title=CO2"></iframe>
</div>

<script>
  // ===== EDIT THESE =====
  const MQTT_HOST = "1bfc0ad49cfc47dc8ab5ae5d8e3a82fa.s1.eu.hivemq.cloud";
  const MQTT_USER = "Plant";
  const MQTT_PASS = "Blastoderm33!";

  const client = mqtt.connect(`wss://${MQTT_HOST}:8884/mqtt`, {
    username: MQTT_USER, password: MQTT_PASS,
    clientId: "phone-" + Math.random().toString(16).slice(2, 8)
  });

  client.on("connect", () => {
    document.getElementById("conn").classList.add("ok");
    document.getElementById("connText").textContent = "live";
    client.subscribe("plant/status");
  });

  client.on("message", (topic, payload) => {
    const d = JSON.parse(payload.toString());
    document.getElementById("soil").textContent = d.soil;
    document.getElementById("bar").style.width   = d.soil + "%";
    document.getElementById("temp").textContent = d.temp.toFixed(1);
    document.getElementById("hum").textContent  = d.hum.toFixed(0);
    document.getElementById("co2").textContent  = Math.round(d.co2);
    document.getElementById("btn").disabled     = d.watering;
    document.getElementById("btn").textContent   = d.watering
      ? "Watering..." : "💧 Water now";
  });

  client.on("error", () => {
    document.getElementById("connText").textContent = "error";
  });

  function water() {
    client.publish("plant/command", "water");
  }
</script>

</body></html>
